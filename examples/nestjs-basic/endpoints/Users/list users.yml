info:
  name: list users
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/users"
  headers:
    - name: authorization
      value: Bearer {{admin_token}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar("admin_token") || bru.getVar("admin_token");

        if (!token) {
          throw new Error("Missing admin_token. Run Auth / login admin first.");
        }

        req.setHeader("authorization", `Bearer ${token}`);
    - type: after-response
      code: |-
        const body = res.getBody();
        const status = typeof res.getStatus === "function" ? res.getStatus() : res.status;

        if (status !== 200) {
          throw new Error(`Expected 200, got ${status}`);
        }

        if (!Array.isArray(body?.users)) {
          throw new Error(`Expected users array, got: ${JSON.stringify(body)}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
