info:
  name: me without token
  type: http
  seq: 4

http:
  method: GET
  url: "{{url}}/auth/me"
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const status = typeof res.getStatus === "function" ? res.getStatus() : res.status;

        if (status !== 401) {
          throw new Error(`Expected 401, got ${status}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
