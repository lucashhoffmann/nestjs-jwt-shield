info:
  name: public
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/public"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const status = typeof res.getStatus === "function" ? res.getStatus() : res.status;

        if (status !== 200) {
          throw new Error(`Expected 200, got ${status}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
