opencollection: 1.0.0

info:
  name: nestjs-basic
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git

request:
  variables:
    - name: url
      value: http://localhost:3000
    - name: admin_email
      value: admin@example.com
    - name: user_email
      value: user@example.com
    - name: password
      value: "123456"
    - name: admin_token
      value: ""
    - name: user_token
      value: ""
    - name: impersonation_token
      value: ""
