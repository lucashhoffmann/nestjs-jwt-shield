info:
  name: get admin as impersonated user
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/admin"
  headers:
    - name: authorization
      value: Bearer {{impersonation_token}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar("impersonation_token") || bru.getVar("impersonation_token");

        if (!token) {
          throw new Error("Missing impersonation_token. Run Auth / impersonate user first.");
        }

        req.setHeader("authorization", `Bearer ${token}`);
    - type: after-response
      code: |-
        const status = typeof res.getStatus === "function" ? res.getStatus() : res.status;

        if (status !== 403) {
          throw new Error(`Expected 403, got ${status}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
