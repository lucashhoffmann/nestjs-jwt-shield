info:
  name: get admin as basic user
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/admin"
  headers:
    - name: authorization
      value: Bearer {{user_token}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getEnvVar("user_token") || bru.getVar("user_token");

        if (!token) {
          throw new Error("Missing user_token. Run Auth / login user first.");
        }

        req.setHeader("authorization", `Bearer ${token}`);
    - type: after-response
      code: |-
        const status = typeof res.getStatus === "function" ? res.getStatus() : res.status;

        if (status !== 403) {
          throw new Error(`Expected 403, got ${status}`);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
